<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Academia - Spring Boot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header class="header">
    <h1>🏋️ Sistema Academia</h1>
    <p>Gerencie alunos, planos e instrutores</p>
  </header>

  <nav class="tabs">
    <button class="tab-button active" onclick="openTab('alunos')">Alunos</button>
    <button class="tab-button" onclick="openTab('planos')">Planos</button>
    <button class="tab-button" onclick="openTab('instrutores')">Instrutores</button>
  </nav>

  <!-- TAB ALUNOS -->
  <div id="alunos" class="tab-content active">
    <div class="card">
      <h2>Cadastrar Novo Aluno</h2>
      <form id="formAluno" class="form">
        <div class="form-row">
          <input type="text" id="nome" placeholder="Nome completo" required>
          <input type="email" id="email" placeholder="E-mail" required>
        </div>
        <div class="form-row">
          <input type="text" id="cpf" placeholder="CPF (000.000.000-00)" required>
          <input type="date" id="dataNascimento" required>
        </div>
        <div class="form-row">
          <input type="tel" id="telefone" placeholder="Telefone" required>
          <select id="planoId" required>
            <option value="">Selecione o plano...</option>
          </select>
        </div>
        <div class="form-row">
          <select id="instrutorId">
            <option value="">Selecione o instrutor (opcional)</option>
          </select>
          <input type="text" id="endereco" placeholder="Endereço">
        </div>
        <button type="submit" class="btn-primary">Cadastrar Aluno</button>
      </form>
    </div>

    <div class="card">
      <h2>Lista de Alunos</h2>
      <div class="search-bar">
        <input type="text" id="searchAluno" placeholder="Buscar aluno..." onkeyup="filtrarAlunos()">
      </div>
      <div id="listaAlunos" class="lista">
        <!-- Lista de alunos será carregada aqui -->
      </div>
    </div>
  </div>

  <!-- TAB PLANOS -->
  <div id="planos" class="tab-content">
    <div class="card">
      <h2>Cadastrar Novo Plano</h2>
      <form id="formPlano" class="form">
        <div class="form-row">
          <input type="text" id="nomePlano" placeholder="Nome do plano" required>
          <input type="number" id="valorMensal" placeholder="Valor mensal" step="0.01" required>
        </div>
        <div class="form-row">
          <input type="number" id="duracaoMeses" placeholder="Duração (meses)" value="12" required>
          <input type="number" id="aulasPorSemana" placeholder="Aulas por semana">
        </div>
        <div class="form-row">
          <textarea id="descricaoPlano" placeholder="Descrição do plano" required></textarea>
        </div>
        <div class="form-row">
          <select id="tipoPlano" required>
            <option value="">Tipo de plano</option>
            <option value="BASICO">Básico</option>
            <option value="STANDARD">Standard</option>
            <option value="PREMIUM">Premium</option>
            <option value="VIP">VIP</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Cadastrar Plano</button>
      </form>
    </div>

    <div class="card">
      <h2>Planos Disponíveis</h2>
      <div id="listaPlanos" class="lista">
        <!-- Lista de planos será carregada aqui -->
      </div>
    </div>
  </div>

  <!-- TAB INSTRUTORES -->
  <div id="instrutores" class="tab-content">
    <div class="card">
      <h2>Cadastrar Novo Instrutor</h2>
      <form id="formInstrutor" class="form">
        <div class="form-row">
          <input type="text" id="nomeInstrutor" placeholder="Nome completo" required>
          <input type="email" id="emailInstrutor" placeholder="E-mail" required>
        </div>
        <div class="form-row">
          <input type="text" id="cpfInstrutor" placeholder="CPF" required>
          <input type="date" id="dataNascimentoInstrutor" required>
        </div>
        <div class="form-row">
          <input type="tel" id="telefoneInstrutor" placeholder="Telefone" required>
          <input type="text" id="especialidade" placeholder="Especialidade" required>
        </div>
        <div class="form-row">
          <input type="number" id="salario" placeholder="Salário" step="0.01">
          <input type="text" id="numeroRegistro" placeholder="Número de registro">
        </div>
        <button type="submit" class="btn-primary">Cadastrar Instrutor</button>
      </form>
    </div>

    <div class="card">
      <h2>Instrutores</h2>
      <div id="listaInstrutores" class="lista">
        <!-- Lista de instrutores será carregada aqui -->
      </div>
    </div>
  </div>

  <!-- MODAL DE DETALHES -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModal()">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
